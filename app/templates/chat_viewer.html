{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="mb-0">Chat with {{ chat_user.username }}</h2>
        <small class="text-muted">Current bonus credits: <strong class="text-success">{{ chat_user.credits }}</strong></small>
    </div>
    
    <form action="/admin/users/{{ chat_user.telegram_id }}/add_credits" method="post" class="d-flex gap-2 align-items-center">
        <label class="small text-muted mb-0">Give free msgs:</label>
        <input type="number" name="amount" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Amount" value="10" min="1" style="width: 80px;" required>
        <button type="submit" class="btn btn-sm btn-success fw-bold">+</button>
    </form>
</div>

<div class="card border-secondary shadow-sm">
    <div class="card-body d-flex flex-column bg-dark" style="height: 600px; overflow-y: auto;">
        {% for msg in messages %}
            <div class="chat-bubble {{ 'chat-user' if msg.role == 'user' else 'chat-bot' }} border border-secondary shadow-sm">
                <small class="d-block text-muted mb-1" style="font-size: 0.7em;">
                    {{ msg.role.upper() }} • {{ msg.timestamp.strftime('%H:%M') }}
                </small>
                {{ msg.content }}
            </div>
        {% else %}
            <p class="text-center text-muted mt-5">No messages found.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
